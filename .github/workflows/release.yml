name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Validate release signing secrets
        run: |
          test -n "${{ secrets.KEY_PROPERTIES }}" || (echo "Missing KEY_PROPERTIES secret" && exit 1)
          test -n "${{ secrets.KEYSTORE_BASE64 }}" || (echo "Missing KEYSTORE_BASE64 secret" && exit 1)

      - name: Create key.properties
        run: echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK and AAB
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Resolve release version
        id: app_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog_reader
        run: |
          VERSION="${{ steps.app_version.outputs.version }}"
          python3 -c "
          import re, sys
          version = sys.argv[1]
          try:
              with open('CHANGELOG.md', 'r') as f:
                  content = f.read()
              pattern = rf'(##\s*\[{re.escape(version)}\].*?)(?=\n##\s*\[|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  section = match.group(1).strip()
                  lines = section.split('\n')
                  if lines[0].startswith('## '):
                      section = '\n'.join(lines[1:]).strip()
                  with open('release_notes.md', 'w') as out:
                      out.write(section)
                  print('Extracted changelog successfully.')
              else:
                  print('Could not find version in changelog.')
                  with open('release_notes.md', 'w') as out:
                      out.write('Release ' + version)
          except Exception as e:
              print('Error reading changelog:', e)
              with open('release_notes.md', 'w') as out:
                  out.write('Release ' + version)
          " "$VERSION"

      - name: Rename release files
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Termchat-${{ steps.app_version.outputs.version }}.apk
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/Termchat-${{ steps.app_version.outputs.version }}.aab

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: download-manager-release-${{ steps.app_version.outputs.version }}
          path: |
            build/app/outputs/flutter-apk/Termchat-${{ steps.app_version.outputs.version }}.apk
            build/app/outputs/bundle/release/Termchat-${{ steps.app_version.outputs.version }}.aab

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            build/app/outputs/flutter-apk/Termchat-${{ steps.app_version.outputs.version }}.apk
            build/app/outputs/bundle/release/Termchat-${{ steps.app_version.outputs.version }}.aab



